<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集中タイマー - 便利ツール集</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #000000;
            color: #00ff00;
            font-family: "MS PGothic", "MS Pゴシック", sans-serif;
            margin: 20px;
        }

        .container {
            width: 400px;
            margin: 0 auto;
            border: 2px solid #00ff00;
            padding: 20px;
            background-color: #111111;
        }

        .timer-display {
            font-size: 80px;
            font-weight: bold;
            text-align: center;
            border: 2px inset #00ff00;
            margin-bottom: 20px;
            background: #000;
            text-shadow: 0 0 10px #00ff00;
            font-family: 'Courier New', monospace;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        button {
            background-color: #333333;
            color: #00ff00;
            border: 2px outset #00ff00;
            padding: 5px 15px;
            cursor: pointer;
            font-family: inherit;
        }

        button:active {
            border: 2px inset #00ff00;
        }

        .status {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            border-top: 1px dotted #00ff00;
            padding-top: 10px;
        }

        a {
            color: #00ff00;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2 style="text-align: center; margin-top: 0;">Pomodoro Timer</h2>

        <div id="root"></div>

        <div class="footer">
            [ <a href="https://00portal.kotojisamadake-tool.workers.dev/">便利ツール集ポータルへ戻る</a> ]
        </div>
    </div>

    <script type="text/babel">
        const App = () => {
            const [timeLeft, setTimeLeft] = React.useState(25 * 60);
            const [isRunning, setIsRunning] = React.useState(false);

            React.useEffect(() => {
                let interval;
                if (isRunning && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft(prev => prev - 1);
                    }, 1000);
                } else if (timeLeft === 0) {
                    setIsRunning(false);
                    alert("時間になりました！");
                }
                return () => clearInterval(interval);
            }, [isRunning, timeLeft]);

            const minutes = String(Math.floor(timeLeft / 60)).padStart(2, '0');
            const seconds = String(timeLeft % 60).padStart(2, '0');

            return (
                <div>
                    <div class="timer-display">{minutes}:{seconds}</div>

                    <div class="controls">
                        <button onClick={() => setIsRunning(!isRunning)}>
                            {isRunning ? '停止' : '開始'}
                        </button>
                        <button onClick={() => { setIsRunning(false); setTimeLeft(25 * 60); }}>
                            リセット
                        </button>
                    </div>

                    <div class="status">
                        {isRunning ? '>>> 集中モード中 <<<' : '待機中'}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
